<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>EcoGestor SaaS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Splash EcoGestor CSS (tela de carregamento) -->
    <link rel="stylesheet" href="css/splash-ecogestor.css">
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>
    <!-- Splash Animation -->
    <div id="splash" class="splash-bg">
        <div class="eco-splash-content">
            <span id="ecoLogoAnim" class="eco-gestor-anim"></span>
        </div>
    </div>

    <!-- Sidebar/Navbar lateral -->
    <nav class="sidebar d-flex flex-column p-3">
        <a class="navbar-brand mb-3" href="#"><i class="fa fa-leaf text-success"></i> EcoGestor</a>
        <ul class="nav nav-pills flex-column mb-auto" id="sidebarMenu">
            <li><a class="nav-link active" data-page="dashboard" href="#"><i class="fa fa-chart-line"></i> Dashboard</a>
            </li>
            <li><a class="nav-link" data-page="dados" href="#"><i class="fa fa-plus-circle"></i> Dados de Entrada</a>
            </li>
            <li><a class="nav-link" data-page="metas" href="#"><i class="fa fa-bullseye"></i> Metas</a></li>
            <li><a class="nav-link" data-page="reports" href="#"><i class="fa fa-file-pdf"></i> Reports</a></li>
            <li><a class="nav-link" data-page="setores" href="#"><i class="fa fa-building"></i> Setores</a></li>
            <li><a class="nav-link" data-page="config" href="#"><i class="fa fa-cog"></i> Configurações</a></li>
            <li><a class="nav-link" data-page="tutoriais" href="#"><i class="fa fa-graduation-cap"></i> Tutoriais</a>
            </li>
        </ul>
        <hr>
        <div class="mt-auto">
            <span class="d-block mb-2"><i class="fa fa-user-circle"></i> <span id="username">Usuário</span></span>
            <a href="#" class="btn btn-outline-light btn-sm" id="logoutBtn"><i class="fa fa-sign-out-alt"></i> Sair</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content" id="app">
    </div>

    <!-- Login Modal -->
    <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true" aria-labelledby="loginModalLabel">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-3">
                <div class="modal-header border-0">
                    <h5 class="modal-title" id="loginModalLabel"><i class="fa fa-sign-in-alt text-success"></i> Login no
                        EcoGestor</h5>
                </div>
                <div class="modal-body">
                    <form id="loginForm" autocomplete="off">
                        <div class="mb-3">
                            <label for="loginEmail" class="form-label">E-mail institucional</label>
                            <input type="email" class="form-control" id="loginEmail" required
                                placeholder="nome@empresa.com.br">
                        </div>
                        <div class="mb-3">
                            <label for="loginSenha" class="form-label">Senha</label>
                            <input type="password" class="form-control" id="loginSenha" required placeholder="********">
                        </div>
                        <div class="alert alert-danger d-none" id="loginError">Credenciais inválidas.</div>
                        <button type="submit" class="btn btn-success w-100">Entrar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <!-- Custom JS (ordem importa!) -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api-config.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/dados.js"></script>
    <script src="js/metas.js"></script>
    <script src="js/reports.js"></script>
    <script src="js/setores.js"></script>
    <!-- Splash EcoGestor JS -->
    <script src="js/splash-ecogestor.js"></script>
    <!-- App.js deve ser carregado por último -->
    <script src="js/app.js"></script>
</body>

</html>
